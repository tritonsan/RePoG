schema_version: 2
profile_status: pending
source_setup_revision: 0
# profile_status: pending | locked | inactive
# Set inactive when setup_profile.experience_mode is companion.
performance:
  turn_protocol: ""
  cold_distill_policy: ""
  validation_policy: ""
  style_review_policy: ""
  latency_notice_policy: exceptional_only
  estimate_acknowledged: false

# Composable Session 0 lenses. A lens may suggest a mechanic, but only an
# explicit entry under mechanics.modules enables that mechanic.
setting_lenses: []
play_lenses: []
lens_conflicts_resolved: []

mechanics:
  modules: []
  resolution_grounding: fictional
  inventory_tracking: abstract
  time_tracking: coarse
  travel_tracking: abstract
  wound_tracking: narrative
  dice_mode: judgment_only

narration:
  point_of_view: second
  tense: present
  camera: close
  prose_density: balanced
  response_length: dynamic
  option_prompting: natural
  challenge_density: balanced
  clue_density: balanced
  dialogue_style: plain
  pacing: dynamic
  narrative_signature:
    anchors: []
    avoid_habits: []
    interiority_policy: player_owned
    sensory_focus: []
    dialogue_balance: balanced
    humor: situational
    emotional_distance: close
  breather_frequency: balanced
  breather_exit_policy: player_led_with_established_triggers

advancement:
  cadence: ""
  presentation: ""

dashboard:
  mode: "off"
  refresh_policy: scene_and_major_visible_change
  map_skin: auto
  tiles: []

# Optional, trigger-driven in-world communication. Missing configuration is
# treated as off for legacy campaigns. Enabling it never authorizes continuous
# actor scans or automatic publication.
world_voices:
  mode: off
  approval_policy: review_each
  dashboard_policy: off
  artifact_richness: balanced
  communication_speed: setting_defined

visuals:
  mode: "off"
  dashboard_placement: gallery_only

# Allowed values
# setting_lenses: fantasy | realistic | cyberpunk | custom:<slug>
# play_lenses: survival | custom:<slug>
# mechanics.modules: bounded_resources | abilities_costs |
#   strict_consumables | wounds | clocks | dice_resolution |
#   structured_travel
# mechanics.resolution_grounding: fictional | bands | numeric
# inventory_tracking: abstract | quantified | encumbrance
# time_tracking: coarse | scene | step
# travel_tracking: abstract | route_time
# wound_tracking: narrative | conditions
# dice_mode: judgment_only | player_rolls | open_gm_rolls |
#   hidden_gm_rolls | hybrid
# point_of_view: first | second | third
# tense: past | present
# camera: close | medium | wide
# prose_density: lean | balanced | lush
# response_length: brief | dynamic | expansive
# option_prompting: natural | gentle_choices | tactical_menu
# challenge_density: low | balanced | high
# clue_density: low | balanced | high
# dialogue_style: plain | balanced | heightened
# pacing: dynamic | deliberate | urgent
# narrative_signature.anchors: up to 3 short positive voice anchors
# narrative_signature.avoid_habits: up to 3 recurring habits to avoid
# narrative_signature.interiority_policy: player_owned |
#   shared_when_invited | guided
# narrative_signature.sensory_focus: up to 2 preferred sensory channels
# narrative_signature.dialogue_balance: dialogue_forward | balanced |
#   narration_forward
# narrative_signature.humor: minimal | situational | frequent
# narrative_signature.emotional_distance: close | moderate | detached
# breather_frequency: sparse | balanced | generous
# breather_exit_policy: player_led | player_led_with_established_triggers |
#   world_led
# advancement.cadence: none | session | scenario | arc | campaign
# advancement.presentation: none | explicit_ooc | automatic_fictional
# dashboard.mode: off | on
# dashboard.refresh_policy: manual | scene_only |
#   scene_and_major_visible_change | every_visible_change
# dashboard.map_skin: auto | minimal | survey | civic | field | systems
# dashboard.tiles: setup_progress | scene | character | stats | resources |
#   clocks | conditions | companions | people | threads | clues | inventory |
#   map | gallery | documents
# world_voices.mode: off | manual | curated | reactive
# world_voices.approval_policy: review_each | preapproved_bounded
# world_voices.dashboard_policy: off | delivered_only |
#   delivered_and_public
# world_voices.artifact_richness: concise | balanced | rich
# world_voices.communication_speed: slow | mixed | fast | setting_defined
# visuals.mode: off | manual_only | major_only | curated | rich
# visuals.dashboard_placement: gallery_only | dashboard_after_approval
# performance.cold_distill_policy: every_durable |
#   scene_checkpoint_or_3_durable | scene_checkpoint_or_5_durable |
#   scene_checkpoint_only
