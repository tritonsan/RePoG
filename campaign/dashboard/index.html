      if (!window.L) { canvas.replaceWith(empty("Interactive atlas unavailable. Use the synchronized text atlas below.")); return; }
      const saved = mapViews.get(tileId) || {};
      const visible = atlas.features.filter((feature) => !feature.presentationOnly);
      const validSelection = visible.some((feature) => feature.id === saved.selectedFeatureId) ? saved.selectedFeatureId : "";
      const selectedFeatureId = validSelection || (visible.some((feature) => feature.id === atlas.currentFeatureId) ? atlas.currentFeatureId : "");
      const reduceMotion = window.matchMedia("(prefers-reduced-motion: reduce)").matches;
      const map = L.map(canvas, {
        crs: L.CRS.Simple, minZoom: -2.5, maxZoom: 4, zoomSnap: .5, zoomDelta: .5,
        zoomControl: false, attributionControl: false, keyboard: false, boxZoom: false,
        scrollWheelZoom: false, doubleClickZoom: false,
        zoomAnimation: !reduceMotion, fadeAnimation: !reduceMotion, markerZoomAnimation: !reduceMotion
      });
      canvas.setAttribute("aria-hidden", "true"); canvas.setAttribute("tabindex", "-1");
      [["atlas-surface", 200], ["atlas-areas", 300], ["atlas-lines", 400], ["atlas-points", 500], ["atlas-labels", 600]].forEach(([name, zIndex]) => {
        const pane = map.createPane(name); pane.style.zIndex = String(zIndex);
      });
      const record = {
        tileId, instance: map, atlas, shell, canvas, selectedFeatureId, popupFeatureId: "",
        layers: new Map(), featureById: new Map(visible.map((feature) => [feature.id, feature])),
        buttons: new Map(Array.from(shell.querySelectorAll(".atlas-feature-button")).map((button) => [button.dataset.featureId, button])),
        detail: shell.querySelector(".atlas-detail"), legend: shell.querySelector(".atlas-legend"), textAtlas: shell.querySelector(".atlas-text")
      };
      mapRegistry.set(tileId, record);
      if (atlas.backgroundImage) L.imageOverlay(atlas.backgroundImage, [[0,0],[atlas.height,atlas.width]], { pane: "atlas-surface", opacity: .86, interactive: false }).addTo(map);
      atlas.features.filter((feature) => feature.geometry.type === "area").forEach((feature) => addAtlasFeature(record, feature));
      atlas.features.filter((feature) => feature.geometry.type === "line").forEach((feature) => addAtlasFeature(record, feature));
      atlas.features.filter((feature) => feature.geometry.type === "point").forEach((feature) => addAtlasFeature(record, feature));
      map.on("zoomend", () => { atlasZoomClass(record); scheduleAtlasDeclutter(record); });
      map.on("moveend", () => {
        const center = map.getCenter(); const state = mapViews.get(tileId) || {};
        Object.assign(state, { center: [center.lat, center.lng], zoom: map.getZoom(), selectedFeatureId: record.selectedFeatureId, popupFeatureId: record.popupFeatureId });
        mapViews.set(tileId, state);
        scheduleAtlasDeclutter(record);
      });
      requestAnimationFrame(() => {
        if (mapRegistry.get(tileId) !== record || !canvas.isConnected) return;
        map.invalidateSize(false);
        const bounds = atlasBounds(record);
        if (Array.isArray(saved.center) && Number.isFinite(Number(saved.zoom)) && bounds.contains(saved.center)) map.setView(saved.center, saved.zoom, { animate: false });
        else fitAtlas(record);
        atlasZoomClass(record); updateAtlasSelection(record); scheduleAtlasDeclutter(record);
        if (saved.legendOpen) record.legend.open = true;
        if (saved.textOpen === false) record.textAtlas.open = false;
        if (saved.popupFeatureId && record.layers.has(saved.popupFeatureId)) selectAtlasFeature(tileId, saved.popupFeatureId, { openPopup: true, pan: false });
      });
    }

    function scheduleAtlasMount(tileId, shell, canvas, atlas) {
      const token = Symbol("atlas-mount"); atlasMountTokens.set(tileId, token);
      requestAnimationFrame(() => mountAtlas(tileId, shell, canvas, atlas, token));
    }

    function mapTile(tileId, data) {
      const atlas = normalizeAtlas(data); const selectedId = mapViews.get(tileId)?.selectedFeatureId || "";
      const shell = element("section", "atlas-shell"); shell.dataset.scale = atlas.scaleMode; shell.dataset.skin = atlasResolvedSkin(atlas); shell.dataset.projection = atlas.projection;
      if (atlas.summary) shell.append(element("p", "muted", atlas.summary));
      const toolbar = element("div", "atlas-toolbar");
      const meta = element("div", "atlas-meta");
      meta.append(element("span", "tag", `${atlasWords(atlas.scaleMode)} atlas`), element("span", "tag", atlasWords(atlas.projection)), element("span", "tag", atlas.skin === "auto" ? "auto · minimal" : atlasWords(atlas.skin)));
      const controls = element("div", "atlas-controls");
      [["−", "Zoom out", "out"], ["+", "Zoom in", "in"], ["Fit", "Fit the full known atlas", "fit"]].forEach(([label, ariaLabel, action]) => {
        const button = element("button", "", label); button.type = "button"; button.setAttribute("aria-label", ariaLabel);
        button.addEventListener("click", () => { const record = mapRegistry.get(tileId); if (!record) return; if (action === "in") record.instance.zoomIn(.5); else if (action === "out") record.instance.zoomOut(.5); else fitAtlas(record); });
        controls.append(button);
      });
      toolbar.append(meta, controls); shell.append(toolbar);
      const stage = element("div", "atlas-stage"); const mapWrap = element("div", "map-wrap");
      const canvas = element("div", "map-canvas"); canvas.setAttribute("aria-hidden", "true"); canvas.setAttribute("tabindex", "-1"); mapWrap.append(canvas);
      stage.append(mapWrap, buildAtlasLegend(atlas)); shell.append(stage);
      const lower = element("div", "atlas-lower");
      const initial = atlas.features.find((feature) => !feature.presentationOnly && feature.id === selectedId) || atlas.features.find((feature) => !feature.presentationOnly && feature.id === atlas.currentFeatureId);
      lower.append(atlasDetail(initial, atlas), atlasText(atlas, tileId, initial?.id || "")); shell.append(lower);
      scheduleAtlasMount(tileId, shell, canvas, atlas);
      return shell;
    }

    function galleryTile(data) {
      const wrap = element("div", "gallery"); const items = array(data.items).filter((item) => object(item).status !== "draft");
      if (!items.length) return empty("No accepted visuals yet.");
      items.forEach((item) => { const button = imageButton(item.image || item.src, item.alt || item.name, item.name || item.title); if (button) wrap.append(button); });
      return wrap;
    }

    function tileBody(tile) {
      const data = object(tile.data);
      switch (tile.type) {
        case "setup_progress": return setupTile(data);
        case "scene": return sceneTile(data);
        case "character": return characterTile(data);
        case "stats": return statsTile(data);
        case "resources": return metersTile(data, "No tracked resources.");
        case "clocks": return metersTile(data, "No visible clocks.");
        case "conditions": return chips(data.items, "No active conditions.");
        case "companions": return people(data.items, "No companions present.");
        case "people": return people(data.items, "No visible named people.");
        case "threads": return itemList(data.items, "No active player-known threads.");
        case "clues": return itemList(data.items, "No player-known clues yet.");
        case "inventory": return chips(data.items, "Inventory is empty.");
        case "map": return mapTile(tile.id, data);
        case "gallery": return galleryTile(data);
        case "documents": return documentsTile(tile.id, data);
        default: return empty("This tile type is not supported by this dashboard.");
      }
    }

    function createTile(tile) {
      const article = element("article", "tile"); article.dataset.tileId = tile.id;
      if (["scene","map","gallery","documents"].includes(tile.type)) article.classList.add(tile.type === "map" ? "full" : "wide");
      const header = element("header", "tile-head"); header.append(element("h2", "", tile.title));
      if (text(tile.subtitle)) header.append(element("span", "tag", tile.subtitle));
      const body = element("div", "tile-body"); body.append(tileBody(tile)); article.append(header, body); return article;
    }

    function renderTiles(tiles) {
      const ordered = array(tiles).slice().sort((a,b) => (Number(a.order)||0) - (Number(b.order)||0));
      tileHost.querySelectorAll(".standalone-empty").forEach((node) => node.remove());
      const wanted = new Set(ordered.map((tile) => tile.id));
      tileHost.querySelectorAll("[data-tile-id]").forEach((node) => {
        if (!wanted.has(node.dataset.tileId)) { captureMap(node.dataset.tileId); tileSignatures.delete(node.dataset.tileId); node.remove(); }
      });
      ordered.forEach((tile, index) => {
        const signature = JSON.stringify(tile);
        let node = tileHost.querySelector(`[data-tile-id="${CSS.escape(tile.id)}"]`);
        if (!node || tileSignatures.get(tile.id) !== signature) {
          if (node) captureMap(tile.id);
          const replacement = createTile(tile);
          if (node) node.replaceWith(replacement); else tileHost.append(replacement);
          node = replacement; tileSignatures.set(tile.id, signature);
        }
        const atIndex = tileHost.children[index]; if (atIndex !== node) tileHost.insertBefore(node, atIndex || null);
      });
      if (!ordered.length) { const message = empty("No player-facing dashboard tiles are enabled for this campaign."); message.classList.add("standalone-empty"); tileHost.append(message); }
    }

    function render(rawData) {
      const data = normalize(rawData);
      const sourceRevision = Number(data.source_revision) || 0;
      const dashboardRevision = Number(data.dashboard_revision) || 0;
      const interval = Math.max(1500, Math.min(60000, Number(data.refresh_interval_ms) || 4000));
      if (Number(data.dashboard_version) >= 3 && appliedSourceRevision !== null) {
        if (sourceRevision < appliedSourceRevision || (sourceRevision === appliedSourceRevision && dashboardRevision <= appliedDashboardRevision)) {
          clearTimeout(refreshTimer); refreshTimer = setTimeout(loadState, interval); return false;
        }
      }
      applyTheme(data.theme);
      setText("campaignTitle", data.campaign?.title, "Campaign"); setText("campaignPitch", data.campaign?.pitch, "The board follows the adventure.");
      const refresh = object(data.refresh); setText("statusText", refresh.reason, "Campaign board current");
      document.getElementById("statusDot").classList.toggle("warn", !["current","disabled"].includes(refresh.status));
      setText("revisionText", `Source ${sourceRevision} · Board ${dashboardRevision}${data.scene_id ? ` · ${data.scene_id}` : ""}`);
      if (appliedSourceRevision !== null && sourceRevision > appliedSourceRevision) {
        documentCache.clear();
        array(data.tiles).filter((tile) => tile?.type === "documents").forEach((tile) => tileSignatures.delete(tile.id));
      }
      renderTiles(data.tiles);
      appliedSourceRevision = sourceRevision; appliedDashboardRevision = dashboardRevision;
      setText("updateAnnouncement", `Campaign board updated to revision ${sourceRevision}.`);
      clearTimeout(refreshTimer); refreshTimer = setTimeout(loadState, interval);
      return true;
    }

    async function loadState() {
      const sequence = ++requestSequence;
      try {
        const response = await fetch(`${stateUrl}?t=${Date.now()}`, { cache: "no-store" });
        if (!response.ok) throw new Error("Campaign state is not available.");
        const data = await response.json();
        if (sequence < latestResponseSequence) return;
        latestResponseSequence = sequence; render(data);
      } catch (error) {
        setText("statusText", "Waiting for campaign state"); document.getElementById("statusDot").classList.add("warn");
        clearTimeout(refreshTimer); refreshTimer = setTimeout(loadState, 4000);
      }
    }
    loadState();
  </script>
</body>
</html>
