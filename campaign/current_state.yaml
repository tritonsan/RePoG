  # remain active without becoming immediate scene pressure.
  immediate_pressure: ""
  open_choices: []

# This compact frame is the resumable causal contract for the live scene. A
# draft campaign may leave its strings blank. Before play, scene_id,
# ongoing_process, last_causal_beat.returned_control_at, and resume_anchor must
# be meaningful enough to resume without inventing a new beat.
scene_frame:
  scene_id: ""
  mode: ambient
  ongoing_process: ""
  disruption: ""
  last_causal_beat:
    player_intent: ""
    world_response: ""
    changed_fact: ""
    returned_control_at: ""
  # At most 3 consequences that have already been caused but not yet surfaced.
  pending_consequences: []
  resume_anchor: ""

inventory: []

conditions: []

active_clocks: []

active_threats: []
